<!DOCTYPE html>
<html>
<head>
<title>陳星睿的簡易計算機</title>

<style>

body{
    background: linear-gradient(135deg,#6ec6ff,#1e88e5);
    text-align:center;
    font-family: "Comic Sans MS", "Arial";
}

h1{
    color:white;
}

#calculator{
    background:white;
    display:inline-block;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

#display{
    width:260px;
    height:60px;
    font-size:30px;
    text-align:right;
    margin-bottom:10px;
    border-radius:10px;
    border:2px solid #2196f3;
}

button{
    width:70px;
    height:70px;
    font-size:24px;
    margin:5px;
    border:none;
    border-radius:20px;
    background:#64b5f6;
    color:white;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px #1976d2;
}

button:hover{
    background:#42a5f5;
}

button:active{
    box-shadow:0 2px #1976d2;
    transform:translateY(3px);
}

.operator{
    background:#ffb74d;
    box-shadow:0 5px #f57c00;
}

.equal{
    background:#66bb6a;
    box-shadow:0 5px #2e7d32;
}

.clear{
    background:#ef5350;
    box-shadow:0 5px #c62828;
}

</style>
</head>

<body>

<h1>rouaa 陳星睿的簡易計算機</h1>

<div id="calculator">

<input type="text" id="display" readonly><br>

<button onclick="appendToDisplay('1')">1</button>
<button onclick="appendToDisplay('2')">2</button>
<button onclick="appendToDisplay('3')">3</button>
<button class="operator" onclick="appendToDisplay('+')">+</button>
<br>

<button onclick="appendToDisplay('4')">4</button>
<button onclick="appendToDisplay('5')">5</button>
<button onclick="appendToDisplay('6')">6</button>
<button class="operator" onclick="appendToDisplay('-')">-</button>
<br>

<button onclick="appendToDisplay('7')">7</button>
<button onclick="appendToDisplay('8')">8</button>
<button onclick="appendToDisplay('9')">9</button>
<button class="operator" onclick="appendToDisplay('*')">*</button>
<br>

<button onclick="appendToDisplay('0')">0</button>
<button class="clear" onclick="clearDisplay()">C</button>
<button class="equal" onclick="calculate()">=</button>
<button class="operator" onclick="appendToDisplay('/')">/</button>

</div>

<script>

function appendToDisplay(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value='';
}

function calculate(){
    var expression=document.getElementById("display").value;
    try{
        document.getElementById("display").value=eval(expression);
    }catch(e){
        document.getElementById("display").value="Error";
    }
}

</script>

</body>
</html>
